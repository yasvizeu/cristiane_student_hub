<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Cristiane · Flashcards</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet"><link rel="stylesheet" href="flashcards.css"></head><body><main class="wrap"><header><a href="index.html">← Hub</a><p>YV Flashcards</p></header><section class="hero"><p class="eyebrow">Cristiane's Review</p><h1>Smart<br><em>Flashcards ✦</em></h1><p>Marque as palavras como difícil, mais ou menos ou fácil. As difíceis voltam mais vezes.</p></section><section class="stats"><div><strong id="knownCount">0</strong><span>dominadas</span></div><div><strong id="reviewCount">0</strong><span>para revisar</span></div><div><strong id="totalCount">0</strong><span>total</span></div></section><section class="stage"><div class="flashcard" id="flashcard" onclick="flipCard()"><div class="inner"><div class="face front"><span>English</span><h2 id="flashEnglish">I am</h2><p>Toque para virar</p></div><div class="face back"><span>Português</span><h2 id="flashPortuguese">eu sou / estou</h2><p>Toque para voltar</p></div></div></div></section><p id="progressNote" class="progress-note">Card 1 / 1</p><section class="actions"><button class="again" onclick="gradeCard('again')">Again</button><button class="hard" onclick="gradeCard('hard')">Hard</button><button class="easy" onclick="gradeCard('easy')">Easy</button></section><section class="actions secondary"><button onclick="speakCard(event)">🔊 Listen</button><button onclick="nextCard()">Next →</button><button onclick="resetStats()">Reset</button></section></main><script src="flashcards.js"></script></body></html>
